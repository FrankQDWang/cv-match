name: Publish Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Check architecture imports
        run: uv run --group dev python tools/check_arch_imports.py
      - name: Ruff
        run: uv run --group dev ruff check src tests experiments
      - name: Ty
        run: uv run --group dev ty check src tests
      - name: Pytest
        run: uv run --group dev python -m pytest -q
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci
      - name: Build release distributions
        run: uv build
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/
      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
