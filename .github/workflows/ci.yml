name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Check architecture imports
        run: uv run --group dev python tools/check_arch_imports.py
      - name: Ruff
        run: uv run --group dev ruff check src tests experiments
      - name: Ty
        run: uv run --group dev ty check src tests
      - name: Pytest
        run: uv run --group dev python -m pytest -q
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci
