[project]
name = "seektalent"
version = "0.2.1"
description = "Local CLI Agent for deterministic multi-round resume matching with Pydantic AI"
readme = "README.md"
license = { text = "GNU Affero General Public License v3.0" }
authors = [
    { name = "frankqdwang", email = "wang15850317595@163.com" }
]
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.1",
    "pydantic>=2.12.0",
    "pydantic-ai>=1.76.0",
    "pydantic-settings>=2.13.1",
    "pyyaml>=6.0.3",
]

[dependency-groups]
dev = [
    "pytest>=8.4.2",
]

[project.scripts]
seektalent = "seektalent.cli:main"
seektalent-ui-api = "seektalent_ui.server:main"

[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
pythonpath = ["src"]
